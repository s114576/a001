<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>自（抽）由（風）人生模擬器</title>

<style>

*{
    box-sizing:border-box;
    font-family:"Microsoft JhengHei",sans-serif;
}

body{
    background:#f5f5f5;
    margin:0;
    padding:20px;
}

.container{
    max-width:900px;
    margin:auto;
}

h1{
    text-align:center;
}

.panel{
    background:white;
    border-radius:12px;
    padding:16px;
    margin-bottom:16px;
    box-shadow:0 2px 8px rgba(0,0,0,.1);
}

.stats{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

.stat{
    background:#fafafa;
    border:1px solid #ddd;
    border-radius:10px;
    padding:10px;
    text-align:center;
}

.stat-value{
    font-size:24px;
    font-weight:bold;
}

.change{
    color:red;
    font-size:12px;
    height:16px;
}

.event-title{
    font-size:26px;
    text-align:center;
    margin-bottom:20px;
}

.sub-event{
    text-align:center;
    font-size:18px;
    margin-bottom:15px;
}

.options{
    display:grid;
    gap:10px;
}

button{
    padding:12px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#4b7bec;
    color:white;
    font-size:16px;
}

button:hover{
    opacity:.9;
}

.log{
    max-height:500px;
    overflow:auto;
}

.log-item{
    border-bottom:1px solid #ddd;
    padding:8px;
}

.achievement{
    color:#d35400;
    font-weight:bold;
}

.end{
    text-align:center;
    font-size:28px;
    margin-top:20px;
}

</style>
</head>

<body>

<div class="container">

<div class="panel">
<h1>自（抽）由（風）人生模擬器</h1>

<div class="stats">

<div class="stat">
老師好感度
<div class="stat-value" id="teacher">50</div>
<div class="change" id="teacherChange"></div>
</div>

<div class="stat">
功德值
<div class="stat-value" id="karma">50</div>
<div class="change" id="karmaChange"></div>
</div>

<div class="stat">
生命值
<div class="stat-value" id="life">100</div>
<div class="change" id="lifeChange"></div>
</div>

<div class="stat">
精神值
<div class="stat-value" id="mental">100</div>
<div class="change" id="mentalChange"></div>
</div>

</div>
</div>

<div class="panel">

<div id="eventTitle" class="event-title">
按下開始
</div>

<div id="subEvent" class="sub-event"></div>

<div id="options" class="options"></div>

</div>

<div class="panel">
<h2>成就</h2>
<div id="achievementList"></div>
</div>

<div class="panel">
<h2>劇情紀錄</h2>
<div id="log" class="log"></div>
</div>

</div>

<script>

/////////////////////////////////////////////////////
// 數值
/////////////////////////////////////////////////////

const stats = {
    teacher:50,
    karma:50,
    life:100,
    mental:100
};

let sixSevenMode = false;

const achievements = new Set();

/////////////////////////////////////////////////////
// 劇情主流程
/////////////////////////////////////////////////////

const mainStory = [
"起床",
"去學校",
"上課",
"下課",
"上課",
"下課",
"上課",
"下課",
"上課",
"吃飯",
"午休",
"上課",
"下課",
"上課",
"下課",
"上課",
"下課",
"放學"
];

/////////////////////////////////////////////////////
// 隨機事件
/////////////////////////////////////////////////////

const classEvents = [
"數學課",
"國文課",
"英文課",
"生物課",
"物理課",
"地理課",
"歷史課聽老師講古代男同故事",
"聽不懂上課內容遂懷疑自己智商",
"覺得自己是天才",
"考試",
"突然停電",
"上課了發現自己沒帶鉛筆盒"
];

const breakEvents = [
"去上廁所",
"和同學聊天",
"去福利社",
"睡覺",
"掃地工作",
"遇到討厭的人",
"沒有冰水可以喝"
];

const toiletEvents = [
"烙賽",
"看到彩虹",
"好順暢喔",
"廁所塞爆了"
];

const lunchEvents = [
"吃到爆炸難吃的東西",
"被請飲料",
"吃到超好吃的東西",
"吃到還不錯的東西"
];

const afterSchoolEvents = [
"回家",
"補習班坐牢",
"西北雨"
];

/////////////////////////////////////////////////////
// 上課選項
/////////////////////////////////////////////////////

const classOptions = [
"認真上課",
"寫補習班作業",
"偷偷划手機",
"走神",
"吃東西",
"周公家教",
"自修",
"搶自擔演唱會的票",
"請老師吃香菜",
"認真回答問題"
];

const mathExtraOptions = [
"用『那些年』認識排列組合",
"糾老師的計算錯誤"
];

/////////////////////////////////////////////////////
// 廁所
/////////////////////////////////////////////////////

const toiletOptions = [
"用衛生紙擦屁股",
"用數學補教擦屁股",
"用English magazine擦屁股"
];

/////////////////////////////////////////////////////
// 聊天
/////////////////////////////////////////////////////

const chatOptions = [
"聊開心的事",
"聊煩惱的事",
"講地獄笑話",
"蛐蛐同學",
"蛐蛐老師",
"讓同學脊椎自由落體"
];

/////////////////////////////////////////////////////
// 福利社
/////////////////////////////////////////////////////

const storeOptions = [
"搶便當",
"買哈根達斯",
"找不到茶葉蛋",
"成為貪吃蛇"
];

/////////////////////////////////////////////////////
// 吃飯
/////////////////////////////////////////////////////

const lunchOptions = [
"去廁所吃飯",
"看Kpop猜歌挑戰",
"把不要吃的食物給同學",
"直接睡覺",
"忘記訂午餐"
];

/////////////////////////////////////////////////////
// 團練
/////////////////////////////////////////////////////

const practiceOptions = [
"朝學姊拋媚眼",
"認真團練",
"無力地團練"
];

/////////////////////////////////////////////////////
// 古代男同故事
/////////////////////////////////////////////////////

const historyOptions = [
"聽不懂",
"姨母笑",
"不想聽",
"哇艸這什麼雷霆野史"
];

/////////////////////////////////////////////////////
// 考試
/////////////////////////////////////////////////////

const examOptions = [
"1+1=2",
"1+1=3",
"算出了圓周率的盡頭",
"6+7=67"
];

/////////////////////////////////////////////////////
// 劇情紀錄
/////////////////////////////////////////////////////

let logs = [];

/////////////////////////////////////////////////////
// 工具函式
/////////////////////////////////////////////////////

function random(arr){
    return arr[Math.floor(Math.random()*arr.length)];
}

function shuffle(arr){

    let a=[...arr];

    for(let i=a.length-1;i>0;i--){

        const j=Math.floor(Math.random()*(i+1));

        [a[i],a[j]]=[a[j],a[i]];
    }

    return a;
}

/////////////////////////////////////////////////////
// 狀態
/////////////////////////////////////////////////////

let storyIndex = 0;
let currentMainEvent = "";
let currentSubEvent = "";
let currentOptions = [];
let currentEventDelta = {};

const usedClassEvents = [];
const usedBreakEvents = [];

/////////////////////////////////////////////////////
// 開始按鈕
/////////////////////////////////////////////////////

document.getElementById("eventTitle").innerHTML =
`
<button onclick="startGame()">開始今天</button>
`;

function startGame(){

    storyIndex = 0;

    document.getElementById("achievementList").innerHTML = "";

    nextStory();
}

/////////////////////////////////////////////////////
// 成就
/////////////////////////////////////////////////////

function unlockAchievement(name){

    if(achievements.has(name)) return;

    achievements.add(name);

    const div = document.createElement("div");

    div.className = "achievement";
    div.textContent = "🏆 " + name;

    document.getElementById("achievementList")
        .appendChild(div);
}

/////////////////////////////////////////////////////
// 數值顯示
/////////////////////////////////////////////////////

function refreshStats(){

    document.getElementById("teacher").textContent = stats.teacher;
    document.getElementById("karma").textContent = stats.karma;
    document.getElementById("life").textContent = stats.life;
    document.getElementById("mental").textContent = stats.mental;
}

/////////////////////////////////////////////////////
// 顯示變化
/////////////////////////////////////////////////////

function showStatChange(stat,value){

    const map = {
        teacher:"teacherChange",
        karma:"karmaChange",
        life:"lifeChange",
        mental:"mentalChange"
    };

    const target = document.getElementById(map[stat]);

    target.textContent =
        value > 0 ? "+" + value : value;

    setTimeout(()=>{
        target.textContent="";
    },2000);
}

/////////////////////////////////////////////////////
// 修改數值
/////////////////////////////////////////////////////

function addStat(stat,value){

    if(sixSevenMode) return;

    stats[stat]+=value;

    refreshStats();

    showStatChange(stat,value);
}

/////////////////////////////////////////////////////
// 劇情紀錄
/////////////////////////////////////////////////////

function addLog(text,deltaText=""){

    const div = document.createElement("div");

    div.className="log-item";

    div.textContent =
        deltaText
        ? `${text} (${deltaText})`
        : text;

    document.getElementById("log")
        .prepend(div);
}

/////////////////////////////////////////////////////
// 飛天大蟑螂
/////////////////////////////////////////////////////

function cockroachCheck(){

    if(Math.random()<0.01){

        currentSubEvent = "看到飛天大蟑螂";

        addStat("mental",-30);

        addLog(
            "看到飛天大蟑螂",
            "精神-30"
        );

        return true;
    }

    return false;
}

/////////////////////////////////////////////////////
// 抽不重複事件
/////////////////////////////////////////////////////

function pickUnique(arr,used){

    if(used.length >= arr.length){

        used.length = 0;
    }

    let available =
        arr.filter(x=>!used.includes(x));

    let result = random(available);

    used.push(result);

    return result;
}

/////////////////////////////////////////////////////
// 劇情推進
/////////////////////////////////////////////////////

function nextStory(){

    checkEnding();

    if(storyIndex >= mainStory.length){

        endGame();
        return;
    }

    currentMainEvent = mainStory[storyIndex];

    storyIndex++;

    currentSubEvent = "";
    currentOptions = [];

    if(cockroachCheck()){

        showNextButton();
        return;
    }

    switch(currentMainEvent){

        case "起床":
            wakeUpEvent();
            break;

        case "上課":
            classEvent();
            break;

        case "下課":
            breakEvent();
            break;

        case "吃飯":
            lunchEvent();
            break;

        case "午休":
            napEvent();
            break;

        case "放學":
            afterSchoolEvent();
            break;

        default:
            noChoiceEvent(currentMainEvent);
    }

}

/////////////////////////////////////////////////////
// NEXT
/////////////////////////////////////////////////////

function showNextButton(){

    document.getElementById("eventTitle")
        .textContent = currentMainEvent;

    document.getElementById("subEvent")
        .textContent = currentSubEvent;

    document.getElementById("options").innerHTML=
        `<button onclick="nextStory()">NEXT</button>`;
}

/////////////////////////////////////////////////////
// 沒選項
/////////////////////////////////////////////////////

function noChoiceEvent(name){

    document.getElementById("eventTitle")
        .textContent = name;

    document.getElementById("subEvent")
        .textContent = "";

    document.getElementById("options").innerHTML=
        `<button onclick="nextStory()">NEXT</button>`;

    addLog(name);
}

/////////////////////////////////////////////////////
// 起床
/////////////////////////////////////////////////////

function wakeUpEvent(){

    document.getElementById("eventTitle")
        .textContent = "起床";

    if(Math.random()<0.15){

        let skip =
            Math.floor(Math.random()*4)+1;

        storyIndex += skip;

        currentSubEvent =
            `睡過頭了（跳過${skip}個劇情）`;

        addLog(
            currentSubEvent
        );

    }else{

        currentSubEvent="成功起床";
    }

    showNextButton();
}

/////////////////////////////////////////////////////
// 上課
/////////////////////////////////////////////////////

function classEvent(){

    let event =
        pickUnique(
            classEvents,
            usedClassEvents
        );

    currentSubEvent = event;

    addStat("mental",-3);

    let options =
        [...classOptions];

    if(event==="數學課"){

        options.push(
            ...mathExtraOptions
        );
    }

    if(event==="考試"){

        options = [...examOptions];
    }

    if(
        event==="歷史課聽老師講古代男同故事"
    ){
        options = [...historyOptions];
    }

    currentOptions =
        shuffle(options).slice(0,4);

    renderOptions();

}

/////////////////////////////////////////////////////
// 下課
/////////////////////////////////////////////////////

function breakEvent(){

    let event =
        pickUnique(
            breakEvents,
            usedBreakEvents
        );

    currentSubEvent = event;

    if(event==="遇到討厭的人"){

        addStat("mental",-10);
    }

    if(event==="沒有冰水可以喝"){

        addStat("life",-5);
    }

    if(event==="睡覺"){

        addStat("mental",10);
    }

    if(event==="去上廁所"){

        currentSubEvent +=
            "｜"+random(toiletEvents);

        currentOptions =
            [...toiletOptions];
    }

    else if(event==="和同學聊天"){

        currentOptions =
            shuffle(chatOptions).slice(0,4);
    }

    else if(event==="去福利社"){

        currentOptions =
            shuffle(storeOptions).slice(0,4);

        unlockAchievement(
            "雄女7公斤詛咒"
        );

        addStat("life",10);
    }

    else if(event==="掃地工作"){

        currentOptions =
            ["認真掃地"];

        if(Math.random()<0.2){

            currentOptions.push(
                "藉打掃合法逃校"
            );
        }
    }

    else{

        showNextButton();
        return;
    }

    renderOptions();
}

/////////////////////////////////////////////////////
// 午休
/////////////////////////////////////////////////////

function napEvent(){

    currentSubEvent="午休";

    addStat("life",10);

    addLog(
        "午休",
        "生命+10"
    );

    showNextButton();
}

/////////////////////////////////////////////////////
// 吃飯/團練
/////////////////////////////////////////////////////

function lunchEvent(){

    if(Math.random()<0.25){

        currentSubEvent="團練";

        addStat("life",-10);
        addStat("mental",-10);

        currentOptions =
            [...practiceOptions];

        renderOptions();

        return;
    }

    currentSubEvent="吃飯";

    let foodEvent =
        random(lunchEvents);

    currentSubEvent +=
        "｜"+foodEvent;

    if(foodEvent==="被請飲料")
        addStat("life",10);

    if(foodEvent==="吃到超好吃的東西"){
        addStat("life",10);
        addStat("mental",10);
    }

    if(foodEvent==="吃到爆炸難吃的東西"){
        addStat("life",-10);
        addStat("mental",-10);
    }

    currentOptions =
        shuffle(lunchOptions).slice(0,4);

    renderOptions();
}

/////////////////////////////////////////////////////
// 放學
/////////////////////////////////////////////////////

function afterSchoolEvent(){

    currentSubEvent =
        random(afterSchoolEvents);

    if(currentSubEvent==="補習班坐牢"){

        addStat("life",-10);
        addStat("mental",-20);
    }

    showNextButton();
}

/////////////////////////////////////////////////////
// 顯示選項
/////////////////////////////////////////////////////

function renderOptions(){

    document.getElementById("eventTitle")
        .textContent = currentMainEvent;

    document.getElementById("subEvent")
        .textContent = currentSubEvent;

    const area =
        document.getElementById("options");

    area.innerHTML="";

    currentOptions.forEach(option=>{

        const btn =
            document.createElement("button");

        btn.textContent=option;

        btn.onclick=()=>choose(option);

        area.appendChild(btn);

    });

}

/////////////////////////////////////////////////////
// 選項效果
/////////////////////////////////////////////////////

function choose(option){

    let changes = [];
    let totalTeacher = 0;
    let totalKarma = 0;
    let totalLife = 0;
    let totalMental = 0;

    function gain(stat,val){

        addStat(stat,val);

        if(stat==="teacher") totalTeacher+=val;
        if(stat==="karma") totalKarma+=val;
        if(stat==="life") totalLife+=val;
        if(stat==="mental") totalMental+=val;

        changes.push(
            `${stat}${val>0?"+":""}${val}`
        );
    }

/////////////////////////////////////////////////////
// 上課選項
/////////////////////////////////////////////////////

    const teacherBad = [
        "寫補習班作業",
        "偷偷划手機",
        "走神",
        "吃東西",
        "周公家教",
        "自修",
        "搶自擔演唱會的票",
        "請老師吃香菜"
    ];

    const teacherGood = [
        "認真上課",
        "認真回答問題",
        "糾老師的計算錯誤",
        "用『那些年』認識排列組合"
    ];

    if(teacherBad.includes(option)){
        gain("teacher",-10);
    }

    if(teacherGood.includes(option)){
        gain("teacher",10);
    }

/////////////////////////////////////////////////////
// 功德值
/////////////////////////////////////////////////////

    if(option==="用數學補教擦屁股"){
        gain("karma",-20);
    }

    if(option==="用English magazine擦屁股"){
        gain("karma",-10);
    }

    if(option==="講地獄笑話"){
        gain("karma",-15);
    }

    if(option==="讓同學脊椎自由落體"){
        gain("karma",-50);
    }

/////////////////////////////////////////////////////
// 精神值
/////////////////////////////////////////////////////

    if(option==="聊開心的事"){
        gain("mental",10);
    }

    if(option==="聊煩惱的事"){
        gain("mental",5);
    }

    if(option==="看Kpop猜歌挑戰"){
        gain("mental",-10);
    }

    if(option==="忘記訂午餐"){
        gain("life",-15);
    }

/////////////////////////////////////////////////////
// 成就
/////////////////////////////////////////////////////

    if(option==="去廁所吃飯"){

        unlockAchievement(
            "獲得巧克力試吃機會"
        );
    }

    if(option==="朝學姊拋媚眼"){

        unlockAchievement(
            "拉拉認證"
        );
    }

    if(option==="用『那些年』認識排列組合"){

        unlockAchievement(
            "黑板上排列組合你捨得解開嗎😭"
        );
    }

/////////////////////////////////////////////////////
// 考試
/////////////////////////////////////////////////////

    if(currentSubEvent==="考試"){

        let result = "";

        if(option==="1+1=2"){

            result = "考試成績100分";

            gain("mental",20);
        }

        if(option==="1+1=3"){

            result = "重補修吧";

            gain("mental",-50);
        }

        if(option==="算出了圓周率的盡頭"){

            result = "pi(兀)分";
        }

        if(option==="6+7=67"){

            result = "考試成績67分";

            unlockAchievement(
                "six seven"
            );

            sixSevenMode = true;

            stats.teacher = 676767;
            stats.karma = 676767;
            stats.life = 676767;
            stats.mental = 676767;

            refreshStats();
        }

        document.getElementById("subEvent")
            .textContent =
            "考試 → " + result;

        addLog(
            "考試 → " + result,
            changes.join(" ")
        );

        setTimeout(()=>{
            nextStory();
        },1000);

        return;
    }

/////////////////////////////////////////////////////
// 團練
/////////////////////////////////////////////////////

    if(currentSubEvent==="團練"){

        gain("life",-5);
        gain("mental",-5);
    }

/////////////////////////////////////////////////////
// 找不到茶葉蛋
/////////////////////////////////////////////////////

    if(option==="找不到茶葉蛋"){

        gain("mental",-10);
    }

/////////////////////////////////////////////////////
// 顯示選項旁變化
/////////////////////////////////////////////////////

    const buttons =
        document.querySelectorAll("#options button");

    buttons.forEach(btn=>{

        if(btn.textContent===option){

            btn.innerHTML =
                option +
                "<br><small>" +
                (changes.length
                    ? changes.join(" ")
                    : "NEXT")
                +
                "</small>";
        }

        else{
            btn.disabled=true;
        }

    });

/////////////////////////////////////////////////////
// 劇情紀錄
/////////////////////////////////////////////////////

    let summary=[];

    if(totalTeacher)
        summary.push(
        `老師${totalTeacher>0?"+":""}${totalTeacher}`
        );

    if(totalKarma)
        summary.push(
        `功德${totalKarma>0?"+":""}${totalKarma}`
        );

    if(totalLife)
        summary.push(
        `生命${totalLife>0?"+":""}${totalLife}`
        );

    if(totalMental)
        summary.push(
        `精神${totalMental>0?"+":""}${totalMental}`
        );

    addLog(
        currentMainEvent +
        "｜" +
        currentSubEvent +
        "｜" +
        option,
        summary.join(" ")
    );

/////////////////////////////////////////////////////
// 一秒後下一劇情
/////////////////////////////////////////////////////

    setTimeout(()=>{

        checkEnding();

        nextStory();

    },1000);

}

/////////////////////////////////////////////////////
// 結束檢查
/////////////////////////////////////////////////////

function checkEnding(){

    if(sixSevenMode) return;

    if(stats.life<=0){

        unlockAchievement(
            "死人微活"
        );

        gameOver(
            "再來一次吧"
        );

        return;
    }

    if(stats.mental<=0){

        unlockAchievement(
            "精神狀態還好嗎…？"
        );

        gameOver(
            "再來一次吧"
        );

        return;
    }

}

/////////////////////////////////////////////////////
// GAME OVER
/////////////////////////////////////////////////////

function gameOver(text){

    document.getElementById("eventTitle")
        .innerHTML =
        `<div class="end">${text}</div>`;

    document.getElementById("subEvent")
        .innerHTML="";

    document.getElementById("options")
        .innerHTML="";

    throw "GAMEOVER";
}

/////////////////////////////////////////////////////
// 結算
/////////////////////////////////////////////////////

function endGame(){

    if(stats.karma>=100){

        unlockAchievement(
            "超級大好人吧！！"
        );
    }

    if(stats.karma<=0){

        unlockAchievement(
            "我聽說地獄來了新的撒旦…"
        );
    }

    document.getElementById("eventTitle")
        .innerHTML=
        `<div class="end">
